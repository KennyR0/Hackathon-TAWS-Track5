services:
  - type: web
    name: nexomercado-api
    runtime: python
    plan: free
    buildCommand: python -m pip install --upgrade pip && python -m pip install -e backend
    startCommand: uvicorn app.main:app --app-dir backend --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.12
      - key: LLM_PROVIDER
        value: openai
      - key: REPOSITORY_BACKEND
        value: supabase
      - key: MARKET_DATA_MODE
        value: hybrid
      - key: MARKET_REQUEST_BUDGET
        value: 32
      - key: MARKET_BATCH_SIZE
        value: 10
      - key: MARKET_REFRESH_SECONDS
        value: 900
      - key: MARKET_PROVIDER_BUDGETS
        value: '{"twelve_data":{"period":"day","maxRequests":800,"safetyReserve":40}}'
      - key: FIXTURE_BUNDLE_PATH
        value: data/fixtures/v1/phase0_bundle.json
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4
      - key: OPENAI_REASONING_EFFORT
        value: medium
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GDELT_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: COINGECKO_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: YAHOO_FINANCE_API_HOST
        sync: false
      - key: YAHOO_FINANCE_BASE_URL
        sync: false
      - key: YAHOO_FINANCE_CHART_PATH
        value: /stock/v3/get-chart

  - type: cron
    name: nexomercado-ingest
    runtime: python
    schedule: "*/15 * * * *"
    buildCommand: python -m pip install --upgrade pip && python -m pip install -e backend
    startCommand: python backend/scripts/run_operations_worker.py --task ingest --format json
    envVars: &workerEnv
      - key: PYTHON_VERSION
        value: 3.12.12
      - key: REPOSITORY_BACKEND
        value: supabase
      - key: MARKET_DATA_MODE
        value: hybrid
      - key: MARKET_REQUEST_BUDGET
        value: 32
      - key: MARKET_BATCH_SIZE
        value: 10
      - key: MARKET_REFRESH_SECONDS
        value: 900
      - key: MARKET_PROVIDER_BUDGETS
        value: '{"twelve_data":{"period":"day","maxRequests":800,"safetyReserve":40}}'
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GDELT_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: COINGECKO_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: YAHOO_FINANCE_API_HOST
        sync: false
      - key: YAHOO_FINANCE_BASE_URL
        sync: false
      - key: YAHOO_FINANCE_CHART_PATH
        value: /stock/v3/get-chart

  - type: cron
    name: nexomercado-prices
    runtime: python
    schedule: "*/15 * * * *"
    buildCommand: python -m pip install --upgrade pip && python -m pip install -e backend
    startCommand: python backend/scripts/run_operations_worker.py --task prices --format json
    envVars: *workerEnv

  - type: cron
    name: nexomercado-macro
    runtime: python
    schedule: "15 6 * * *"
    buildCommand: python -m pip install --upgrade pip && python -m pip install -e backend
    startCommand: python backend/scripts/run_operations_worker.py --task macro --format json
    envVars: *workerEnv

  - type: cron
    name: nexomercado-reconcile
    runtime: python
    schedule: "10 * * * *"
    buildCommand: python -m pip install --upgrade pip && python -m pip install -e backend
    startCommand: python backend/scripts/run_operations_worker.py --task reconcile --format json
    envVars: *workerEnv

  - type: cron
    name: nexomercado-cleanup
    runtime: python
    schedule: "40 5 * * *"
    buildCommand: python -m pip install --upgrade pip && python -m pip install -e backend
    startCommand: python backend/scripts/run_operations_worker.py --task cleanup --format json
    envVars: *workerEnv
